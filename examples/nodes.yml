    camera_id: front
    base_url: http://multivid-cam-front.local:8080
    ssh_host: multivid-cam-front.local
    ssh_user: openscan
    remote_output_root: /srv/openscan-camera/sessions
    local_alias: front
  - name: cam-side
    camera_id: side
    base_url: http://multivid-cam-side.local:8080
    ssh_host: multivid-cam-side.local
    ssh_user: openscan
    remote_output_root: /srv/openscan-camera/sessions
    local_alias: side
  - name: cam-top
    camera_id: top
    base_url: http://multivid-cam-top.local:8080
    ssh_host: multivid-cam-top.local
    ssh_user: openscan
    remote_output_root: /srv/openscan-camera/sessions
    local_alias: top
