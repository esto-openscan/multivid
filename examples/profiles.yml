profiles:
  video_1080p25_auto:
    description: 1080p raw H.264 elementary stream at 25 fps with automatic camera controls
    output_extension: h264
    recording:
      width: 1920
      height: 1080
      framerate: 25
      bitrate: 12000000
      codec: h264
      container: null
      duration: null
      nopreview: true
      save_pts: false
    camera_controls:
      shutter_us: null
      gain: null
      awbgains: null
      autofocus_mode: null
      lens_position: null
      denoise: null
      ev: null
      metering: null
      awb: null
    camera_control_policy:
      pre_roll_seconds: 5
      exposure_mode: auto
      awb_mode: auto
      focus_mode: auto
      reuse_prepared_controls: true
      refocus_on_each_take: false
      prepare_warmup_seconds: 0
      use_calibration_suggestions: false
      apply_suggestions_to_recording: false
    rpicam_vid_extra_args:
      - --inline

